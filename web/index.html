<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="dashboard" aria-label="Finance tracker">
        <div class="summary-panel">
          <p class="eyebrow">Personal Finance Tracker</p>
          <h1>Track spending as it happens.</h1>
          <div class="total-card" aria-live="polite">
            <span>Total spent</span>
            <strong id="totalSpent">$0.00</strong>
          </div>
          <div class="stats-grid">
            <div>
              <span>Entries</span>
              <strong id="entryCount">0</strong>
            </div>
            <div>
              <span>Categories</span>
              <strong id="categoryCount">0</strong>
            </div>
          </div>
        </div>

        <form class="expense-form" id="expenseForm">
          <label for="amount">Amount</label>
          <div class="money-input">
            <span>$</span>
            <input id="amount" name="amount" type="number" min="0.01" step="0.01" placeholder="0.00" required>
          </div>

          <label for="category">Category</label>
          <input id="category" name="category" type="text" placeholder="Food, Transport, Rent">

          <button type="submit">Add expense</button>
          <p class="form-message" id="formMessage" role="status"></p>
        </form>
      </section>

      <section class="content-grid">
        <div class="expense-list-wrap">
          <div class="section-title">
            <h2>Recent expenses</h2>
            <span id="listHint">Synced with data/expenses.txt</span>
          </div>
          <ul class="expense-list" id="expenseList"></ul>
        </div>

        <div class="category-panel">
          <div class="section-title">
            <h2>By category</h2>
          </div>
          <div class="category-list" id="categoryList"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
